# ─── Server ────────────────────────────────────────────────
server.port=8080

# ─── MySQL Database ─────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/mealdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=abc123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── TheMealDB External API ─────────────────────────────────
mealdb.api.base-url=https://www.themealdb.com/api/json/v1/1

# ─── Logging ────────────────────────────────────────────────
logging.level.com.mealdb=DEBUG
logging.level.org.springframework.web=INFO
